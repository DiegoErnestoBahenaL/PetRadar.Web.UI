<div class="container-fluid py-3">
  <div class="row g-3">
    <div class="col-12 col-lg-3">
      <div class="card shadow-sm">
        <div class="card-header">
          <h5 class="mb-0">Filtros</h5>
        </div>

        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Especie</label>
            <select class="form-select" [(ngModel)]="filters.species">
              <option value="">Todas</option>
              <option value="Dog">Perro</option>
              <option value="Cat">Gato</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Tipo de reporte</label>
            <select class="form-select" [(ngModel)]="filters.reportType">
              <option value="">Todos</option>
              <option value="Lost">Perdido</option>
              <option value="Found">Encontrado</option>
              <option value="Stray">Callejero</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" [(ngModel)]="filters.reportStatus">
              <option value="">Todos</option>
              <option value="Active">Activo</option>
              <option value="Resolved">Resuelto</option>
              <option value="Adopted">Adoptado</option>
              <option value="Cancelled">Cancelado</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Fecha inicio</label>
            <input class="form-control" type="date" [(ngModel)]="filters.startDate" />
          </div>

          <div class="mb-3">
            <label class="form-label">Fecha fin</label>
            <input class="form-control" type="date" [(ngModel)]="filters.endDate" />
          </div>

          <div class="mb-3">
            <label class="form-label">Radio kernel: {{ filters.radius }}</label>
            <input
                class="form-range"
                type="range"
                min="10"
                max="50"
                step="1"
                [(ngModel)]="filters.radius"
                (input)="onHeatmapSettingChange()"
                />
          </div>

          <div class="mb-3">
            <label class="form-label">Intensidad: {{ filters.intensity }}</label>
            <input
                class="form-range"
                type="range"
                min="0.2"
                max="1"
                step="0.1"
                [(ngModel)]="filters.intensity"
                (input)="onHeatmapSettingChange()"
            />
          </div>

          <button class="btn btn-primary w-100" (click)="applyFilters()">
            Generar mapa
          </button>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-9">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Mapa de calor ZMG</h5>
          <span class="badge text-bg-secondary">
            {{ filteredReports.length }} reportes
          </span>
        </div>

        <div class="card-body p-0">
          <div #mapContainer class="heatmap-container"></div>
        </div>
      </div>
    </div>
  </div>
</div>
