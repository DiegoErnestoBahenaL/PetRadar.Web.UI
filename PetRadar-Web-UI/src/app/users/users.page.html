<!-- Toast -->
<div *ngIf="toastMsg" class="alert mt-2"
     [ngClass]="{
       'alert-success': toastType === 'success',
       'alert-warning': toastType === 'warning',
       'alert-danger':  toastType === 'danger',
       'alert-info':    toastType === 'info'
     }">
  {{ toastText }}
</div>

<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h3 class="card-title mb-0">Usuarios</h3>

    <div class="card-tools d-flex align-items-center" style="gap:10px;">
      <div class="input-group input-group-sm" style="width: 300px;">
        <input
          class="form-control"
          placeholder="Buscar"
          [(ngModel)]="filter"
          (input)="applyFilter()"
        />
        <button
          class="btn btn-outline-secondary"
          type="button"
          title="Limpiar"
          (click)="filter=''; applyFilter()"
          [disabled]="!filter"
        >
          <i class="fas fa-times"></i>
        </button>
      </div>

      <button class="btn btn-primary btn-sm" (click)="openCreate()">
        <i class="fas fa-plus me-1"></i>
        Nuevo
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="px-3 py-2 border-bottom">
    <div class="progress" style="height: 6px;">
      <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
    </div>
  </div>

  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-bordered table-hover table-striped align-middle mb-0">
        <thead>
          <tr>
            <th style="cursor:pointer;" (click)="toggleSort('id')">
              ID
              <i class="fas ms-1"
                 [ngClass]="{
                   'fa-sort': sortKey !== 'id',
                   'fa-sort-up': sortKey === 'id' && sortDir === 'asc',
                   'fa-sort-down': sortKey === 'id' && sortDir === 'desc'
                 }"></i>
            </th>

            <th style="cursor:pointer;" (click)="toggleSort('email')">
              Email
              <i class="fas ms-1"
                 [ngClass]="{
                   'fa-sort': sortKey !== 'email',
                   'fa-sort-up': sortKey === 'email' && sortDir === 'asc',
                   'fa-sort-down': sortKey === 'email' && sortDir === 'desc'
                 }"></i>
            </th>

            <th style="cursor:pointer;" (click)="toggleSort('name')">
              Nombre
              <i class="fas ms-1"
                 [ngClass]="{
                   'fa-sort': sortKey !== 'name',
                   'fa-sort-up': sortKey === 'name' && sortDir === 'asc',
                   'fa-sort-down': sortKey === 'name' && sortDir === 'desc'
                 }"></i>
            </th>

            <th style="cursor:pointer;" (click)="toggleSort('lastName')">
              Apellido
              <i class="fas ms-1"
                 [ngClass]="{
                   'fa-sort': sortKey !== 'lastName',
                   'fa-sort-up': sortKey === 'lastName' && sortDir === 'asc',
                   'fa-sort-down': sortKey === 'lastName' && sortDir === 'desc'
                 }"></i>
            </th>

            <th style="cursor:pointer;" (click)="toggleSort('phoneNumber')">
              Teléfono
              <i class="fas ms-1"
                 [ngClass]="{
                   'fa-sort': sortKey !== 'phoneNumber',
                   'fa-sort-up': sortKey === 'phoneNumber' && sortDir === 'asc',
                   'fa-sort-down': sortKey === 'phoneNumber' && sortDir === 'desc'
                 }"></i>
            </th>

            <!--<th style="cursor:pointer;" (click)="toggleSort('isActive')">
              Activo
              <i class="fas ms-1"
                 [ngClass]="{
                   'fa-sort': sortKey !== 'isActive',
                   'fa-sort-up': sortKey === 'isActive' && sortDir === 'asc',
                   'fa-sort-down': sortKey === 'isActive' && sortDir === 'desc'
                 }"></i>
            </th> -->

            <th style="width:140px;" class="text-end">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let u of pagedUsers">
            <td class="fw-semibold">{{ u.id }}</td>
            <td>{{ u.email ?? '-' }}</td>
            <td>{{ u.name ?? '-' }}</td>
            <td>{{ u.lastName ?? '-' }}</td>
            <td>{{ u.phoneNumber ?? '-' }}</td>

            <!--<td>{{ u.isActive ?? '-' }}</td> -->
            

            <td class="text-end text-nowrap">
              <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-warning" (click)="openEdit(u)" title="Editar">
                  <i class="fas fa-pen"></i>
                </button>

                <button class="btn btn-outline-danger" (click)="delete(u)" title="Eliminar">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>

          <tr *ngIf="!loading && pagedUsers.length === 0">
            <td colspan="7" class="text-center p-4 text-muted">
              <i class="fas fa-inbox me-2"></i> Sin resultados
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card-footer d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center" style="gap:10px;">
      <span class="text-muted">
        {{ totalItems }} registros • Página {{ page }} de {{ totalPages }}
      </span>

      <select class="form-select form-select-sm"
              style="width: 90px;"
              [ngModel]="pageSize"
              (ngModelChange)="setPageSize($event)">
        <option *ngFor="let s of pageSizeOptions" [ngValue]="s">{{ s }}</option>
      </select>
    </div>

    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-secondary" (click)="prevPage()" [disabled]="page <= 1">
        Anterior
      </button>
      <button class="btn btn-outline-secondary" (click)="nextPage()" [disabled]="page >= totalPages">
        Siguiente
      </button>
    </div>
  </div>
</div>

<!-- Modal -->
<app-user-dialog
  [open]="modalOpen"
  [data]="modalData"
  (closed)="onUserDialogClosed($event)">
</app-user-dialog>
